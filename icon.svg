<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a1a" rx="32"/>
  <!-- Outer glass panel -->
  <rect x="32" y="32" width="136" height="136" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- CPU die glass -->
  <rect x="60" y="60" width="80" height="80" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Inner die -->
  <rect x="76" y="76" width="48" height="48" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <!-- Die detail lines -->
  <line x1="82" y1="82" x2="118" y2="82" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="82" y1="92" x2="118" y2="92" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <line x1="82" y1="102" x2="118" y2="102" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <line x1="82" y1="112" x2="118" y2="112" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
