<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="32" fill="url(#bg)" stroke="#333" stroke-width="1"/>
  <!-- Terminal window -->
  <rect x="30" y="35" width="140" height="95" rx="8" fill="#1d1d1f" stroke="#333" stroke-width="1"/>
  <!-- Title bar dots -->
  <circle cx="46" cy="48" r="4" fill="#ff5f57" opacity="0.7"/>
  <circle cx="60" cy="48" r="4" fill="#febc2e" opacity="0.7"/>
  <circle cx="74" cy="48" r="4" fill="#28c840" opacity="0.7"/>
  <!-- Terminal text -->
  <text x="45" y="75" font-family="monospace" font-size="12" font-weight="bold" fill="#f5f5f7">nullC</text>
  <text x="45" y="90" font-family="monospace" font-size="9" fill="#4ade80" opacity="0.8">C -> ARM64 -> bin</text>
  <text x="45" y="105" font-family="monospace" font-size="9" fill="#4ade80" opacity="0.5">10/10 levels</text>
  <rect x="45" y="112" width="7" height="10" fill="#4ade80" opacity="0.6"/>
  <!-- Circuit board traces below -->
  <line x1="50" y1="150" x2="80" y2="150" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <line x1="80" y1="150" x2="80" y2="165" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <line x1="80" y1="165" x2="120" y2="165" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <line x1="120" y1="165" x2="120" y2="150" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <line x1="120" y1="150" x2="155" y2="150" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
  <!-- Circuit nodes -->
  <circle cx="80" cy="150" r="3" fill="#4ade80" opacity="0.4"/>
  <circle cx="120" cy="165" r="3" fill="#4ade80" opacity="0.4"/>
  <circle cx="100" cy="155" r="3" fill="#4ade80" opacity="0.4"/>
  <line x1="100" y1="155" x2="100" y2="165" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
  <!-- Layer lines -->
  <line x1="40" y1="180" x2="160" y2="180" stroke="#4ade80" stroke-width="1" opacity="0.15"/>
  <line x1="45" y1="175" x2="155" y2="175" stroke="#4ade80" stroke-width="1" opacity="0.1"/>
</svg>
