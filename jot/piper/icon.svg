<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#111"/>
  <!-- Terminal prompt cursor -->
  <text x="40" y="82" font-family="monospace" font-size="48" font-weight="bold" fill="#4ade80" opacity="0.9">&gt;_</text>
  <!-- Pipe symbol -->
  <text x="108" y="82" font-family="monospace" font-size="48" font-weight="bold" fill="#fff" opacity="0.7">|</text>
  <!-- Tool connection lines -->
  <line x1="50" y1="105" x2="150" y2="105" stroke="#fff" stroke-width="1.5" opacity="0.15"/>
  <!-- Three tool dots -->
  <circle cx="65" cy="130" r="6" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="130" r="6" fill="#fff" opacity="0.35"/>
  <circle cx="135" cy="130" r="6" fill="#fff" opacity="0.2"/>
  <!-- Connection lines from pipe to tools -->
  <line x1="100" y1="105" x2="65" y2="124" stroke="#fff" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="105" x2="100" y2="124" stroke="#fff" stroke-width="1" opacity="0.2"/>
  <line x1="100" y1="105" x2="135" y2="124" stroke="#fff" stroke-width="1" opacity="0.2"/>
  <!-- Bottom bar (output) -->
  <rect x="50" y="150" width="100" height="8" rx="4" fill="#4ade80" opacity="0.25"/>
</svg>
