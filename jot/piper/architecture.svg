<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <rect width="720" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="16" font-weight="600" fill="#1d1d1f">piper architecture</text>

  <!-- CLI Layer -->
  <rect x="280" y="52" width="160" height="44" rx="10" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="360" y="79" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="13" font-weight="500" fill="#1d1d1f">cli.py (REPL)</text>

  <!-- Arrow CLI -> Agent -->
  <line x1="360" y1="96" x2="360" y2="130" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent -->
  <rect x="250" y="130" width="220" height="44" rx="10" fill="#e8f4fd" stroke="#007aff" stroke-width="1.5"/>
  <text x="360" y="157" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="13" font-weight="500" fill="#007aff">agent.py (tool-use loop)</text>

  <!-- Arrow Agent -> LLM -->
  <line x1="360" y1="174" x2="360" y2="210" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Layer -->
  <rect x="260" y="210" width="200" height="44" rx="10" fill="#fff3e0" stroke="#ff9500" stroke-width="1.5"/>
  <text x="360" y="237" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="13" font-weight="500" fill="#ff9500">llm/ (Arthur LLM)</text>

  <!-- Arrow Agent -> Tools -->
  <line x1="470" y1="152" x2="520" y2="152" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tools container -->
  <rect x="520" y="70" width="170" height="210" rx="12" fill="#f0fdf4" stroke="#34c759" stroke-width="1.5"/>
  <text x="605" y="94" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="12" font-weight="600" fill="#34c759">tools/</text>

  <!-- Tool boxes -->
  <rect x="536" y="106" width="60" height="28" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="566" y="124" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="10" fill="#1d1d1f">bash</text>

  <rect x="614" y="106" width="60" height="28" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="644" y="124" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="10" fill="#1d1d1f">read</text>

  <rect x="536" y="146" width="60" height="28" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="566" y="164" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="10" fill="#1d1d1f">write</text>

  <rect x="614" y="146" width="60" height="28" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="644" y="164" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="10" fill="#1d1d1f">edit</text>

  <rect x="536" y="186" width="60" height="28" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="566" y="204" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="10" fill="#1d1d1f">grep</text>

  <rect x="614" y="186" width="60" height="28" rx="6" fill="#fff" stroke="#d2d2d7" stroke-width="1"/>
  <text x="644" y="204" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="10" fill="#1d1d1f">glob</text>

  <!-- Config -->
  <rect x="30" y="130" width="160" height="44" rx="10" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="110" y="157" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="13" font-weight="500" fill="#86868b">config.py</text>

  <!-- Arrow Config -> Agent -->
  <line x1="190" y1="152" x2="250" y2="152" stroke="#86868b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data flow labels -->
  <text x="360" y="118" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="9" fill="#86868b">user input</text>
  <text x="360" y="202" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="9" fill="#86868b">generate()</text>
  <text x="497" y="144" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="9" fill="#86868b">execute</text>

  <!-- Future: filesystem -->
  <rect x="520" y="310" width="170" height="44" rx="10" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="605" y="337" text-anchor="middle" font-family="-apple-system, Helvetica" font-size="12" fill="#86868b">filesystem / shell</text>

  <line x1="605" y1="280" x2="605" y2="310" stroke="#86868b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#86868b"/>
    </marker>
  </defs>
</svg>
