<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #1a1a1a; stroke: #0071e3; stroke-width: 2; }
      .label { fill: #e0e0e0; font-size: 13px; text-anchor: middle; }
      .sub { fill: #888; font-size: 10px; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="#111"/>

  <!-- jot repo -->
  <rect x="20" y="75" width="110" height="50" rx="8" class="box"/>
  <text x="75" y="97" class="label">jot/</text>
  <text x="75" y="113" class="sub">repo root</text>

  <!-- Fan-out -->
  <line x1="132" y1="88" x2="168" y2="35" class="arrow"/>
  <line x1="132" y1="100" x2="168" y2="100" class="arrow"/>
  <line x1="132" y1="112" x2="168" y2="165" class="arrow"/>

  <!-- jot -->
  <rect x="170" y="15" width="120" height="40" rx="8" class="box"/>
  <text x="230" y="32" class="label">jot</text>
  <text x="230" y="47" class="sub">C99 interpreter</text>

  <!-- examples -->
  <rect x="170" y="80" width="120" height="40" rx="8" class="box"/>
  <text x="230" y="97" class="label">examples</text>
  <text x="230" y="112" class="sub">sample .jot programs</text>

  <!-- docs -->
  <rect x="170" y="145" width="120" height="40" rx="8" class="box"/>
  <text x="230" y="162" class="label">docs</text>
  <text x="230" y="177" class="sub">landing page</text>

  <!-- jot pipeline -->
  <line x1="292" y1="35" x2="338" y2="35" class="arrow"/>
  <rect x="340" y="15" width="100" height="40" rx="8" class="box"/>
  <text x="390" y="32" class="label">Lexer</text>
  <text x="390" y="47" class="sub">tokenize</text>
  <line x1="442" y1="35" x2="478" y2="35" class="arrow"/>
  <rect x="480" y="15" width="100" height="40" rx="8" class="box"/>
  <text x="530" y="32" class="label">Parser</text>
  <text x="530" y="47" class="sub">AST</text>
  <line x1="582" y1="35" x2="618" y2="35" class="arrow"/>
  <rect x="620" y="15" width="110" height="40" rx="8" class="box"/>
  <text x="675" y="32" class="label">Tree Walker</text>
  <text x="675" y="47" class="sub">eval + stdlib</text>

  <!-- examples pipeline -->
  <line x1="292" y1="100" x2="338" y2="100" class="arrow"/>
  <rect x="340" y="80" width="100" height="40" rx="8" class="box"/>
  <text x="390" y="97" class="label">Samples</text>
  <text x="390" y="112" class="sub">syntax coverage</text>
  <line x1="442" y1="100" x2="478" y2="100" class="arrow"/>
  <rect x="480" y="80" width="100" height="40" rx="8" class="box"/>
  <text x="530" y="97" class="label">Fixtures</text>
  <text x="530" y="112" class="sub">feature demos</text>
  <line x1="582" y1="100" x2="618" y2="100" class="arrow"/>
  <rect x="620" y="80" width="110" height="40" rx="8" class="box"/>
  <text x="675" y="97" class="label">CLI Usage</text>
  <text x="675" y="112" class="sub">run + inspect</text>

  <!-- docs pipeline -->
  <line x1="292" y1="165" x2="338" y2="165" class="arrow"/>
  <rect x="340" y="145" width="100" height="40" rx="8" class="box"/>
  <text x="390" y="162" class="label">Overview</text>
  <text x="390" y="177" class="sub">language intro</text>
  <line x1="442" y1="165" x2="478" y2="165" class="arrow"/>
  <rect x="480" y="145" width="100" height="40" rx="8" class="box"/>
  <text x="530" y="162" class="label">Examples</text>
  <text x="530" y="177" class="sub">copy-paste start</text>
  <line x1="582" y1="165" x2="618" y2="165" class="arrow"/>
  <rect x="620" y="145" width="110" height="40" rx="8" class="box"/>
  <text x="675" y="162" class="label">GitHub</text>
  <text x="675" y="177" class="sub">nulljosh/jot</text>
</svg>
