  <line x1="108" y1="82" x2="108" y2="118" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
  <!-- Center core -->
  <rect x="92" y="92" width="16" height="16" rx="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <!-- Top pins -->
  <rect x="74" y="44" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="86" y="44" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="98" y="44" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="110" y="44" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="122" y="44" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Bottom pins -->
  <rect x="74" y="142" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="86" y="142" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="98" y="142" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="110" y="142" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="122" y="142" width="3" height="14" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Left pins -->
  <rect x="44" y="74" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="44" y="86" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="44" y="98" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="44" y="110" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="44" y="122" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Right pins -->
  <rect x="142" y="74" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="142" y="86" width="14" height="3" rx="1" fill="rgba(255,255,255,0.3)"/>
